                  <div class="ht-field"><label>MiniMax API key</label><input class="ht-input" name="minimax_api_key" type="password" value="" autocomplete="off"></div>
                  <div class="ht-field"><label>MiniMax group id</label><input class="ht-input" name="minimax_group_id" value="" autocomplete="off"></div>
