      bindBackdropDismiss(backdrop, close);
      const form = backdrop.querySelector("[data-role='node-form']");
      const msg = backdrop.querySelector("[data-role='form-msg']");
      const clearRestoredFields = () => {
        form.querySelectorAll("[data-clear-on-open='true']").forEach((field) => {
          field.value = "";
          field.defaultValue = "";
          field.setAttribute("value", "");
        });
      };
      clearRestoredFields();
      requestAnimationFrame(clearRestoredFields);
      setTimeout(clearRestoredFields, 80);
      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const data = new FormData(form);
        const payload = Object.fromEntries(data.entries());
        payload.node_state_from_backup_path = String(data.get("ui_backup_path") || "").trim();
        payload.discord_bot_token = String(data.get("ui_discord_bot_token") || "").trim();
        delete payload.ui_backup_path;
        delete payload.ui_discord_bot_token;
        payload.start_immediately = data.get("start_immediately") === "on";
        msg.textContent = "Creating node...";
        form.querySelectorAll("button,input,select,textarea").forEach((el) => el.disabled = true);
        try {
          const result = await hermes("/nodes", { method: "POST", body: payload });
          const start = result?.node_create?.start || {};
          msg.textContent = start.ok ? "Node created and running." : (start.skipped ? "Node env profile created." : `Node start needs attention: ${start?.error?.message || "not started"}`);
          await loadNodes({ force: true });
          setTimeout(close, 900);
        } catch (error) {
          msg.textContent = error.message || String(error);
          form.querySelectorAll("button,input,select,textarea").forEach((el) => el.disabled = false);
        }
      });
      form.querySelector("input[name='node_id']")?.focus();
    }

    function onPointerDown(event) {
      const card = event.target.closest("[data-node-id]");
      if (!card || event.button !== 0) return;
      closeMenu();
      const id = card.dataset.nodeId;
      state.selected = id;
      renderDetails();
      const pos = state.positions[id] || { x: 0, y: 0 };
      state.dragging = {
        id,
        pointerId: event.pointerId,
        startX: event.clientX,
        startY: event.clientY,
        originX: pos.x,
        originY: pos.y,
        moved: false
      };
      card.classList.add("dragging");
      card.setPointerCapture?.(event.pointerId);
    }

    function onPointerMove(event) {
      if (!state.dragging) return;
      const drag = state.dragging;
      const width = Math.max(340, stageEl.clientWidth || 640);
      const height = Math.max(260, stageEl.clientHeight || 380);
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;
      if (Math.abs(dx) + Math.abs(dy) > 3) drag.moved = true;
      state.positions[drag.id] = {
        x: clamp(drag.originX + dx, 12, width - 154),
        y: clamp(drag.originY + dy, 12, height - 84)
      };
      drawTopology();
    }

    function onPointerUp() {
      if (!state.dragging) return;
      state.justDragged = state.dragging.moved;
      state.dragging = null;
      nodesEl.querySelectorAll(".dragging").forEach((item) => item.classList.remove("dragging"));
      saveLayoutSoon();
      setTimeout(() => { state.justDragged = false; }, 0);
    }

    listen(nodesEl, "pointerdown", onPointerDown);
    listen(window, "pointermove", onPointerMove);
    listen(window, "pointerup", onPointerUp);
    listen(nodesEl, "click", (event) => {
      const card = event.target.closest("[data-node-id]");
      if (!card || state.justDragged) return;
      state.selected = card.dataset.nodeId;
      drawTopology();
    });
    listen(root, "click", (event) => {
      if (event.target.closest("[data-action='add-node']")) openAddNodeModal();
      if (!event.target.closest(".ht-menu")) closeMenu();
    });
    listen(window, "keydown", (event) => {
      if (event.key === "Escape") {
        closeMenu();
        clearInterval(state.statsTimer);
        state.statsTimer = null;
        root.querySelectorAll(".ht-session,.ht-modal-backdrop").forEach((item) => item.remove());
      }
    });

    if (typeof ResizeObserver !== "undefined") {
      const resizeObserver = new ResizeObserver(() => drawTopology());
      resizeObserver.observe(stageEl);
      addCleanup(() => resizeObserver.disconnect());
    }

    await loadLayout();
    await loadNodes().catch(showError);
    const timer = setInterval(() => {
      void loadNodes().catch(showError);
    }, 5000);
    addCleanup(() => clearInterval(timer));
    addCleanup(() => clearInterval(state.statsTimer));
    addCleanup(() => clearTimeout(state.layoutTimer));
    parent.__hermesTopologyCleanup = () => {
      while (cleanups.length) {
        try { cleanups.pop()(); } catch {}
      }
      parent.__hermesTopologyCleanup = null;
    };
  }
