              <div class="ht-stat"><div class="ht-stat-label">Tools</div><div class="ht-stat-value" data-stat="tools">0</div></div>
              <div class="ht-stat"><div class="ht-stat-label">Warnings</div><div class="ht-stat-value" data-stat="warnings">0</div></div>
