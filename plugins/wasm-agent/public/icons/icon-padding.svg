<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1254 1254" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WASM Agent WA monogram icon</title>
  <desc id="desc">Vector WA monogram extracted from the WASM Agent logo, with metallic fill and subtle cyan-purple glow.</desc>
  <defs>
    <linearGradient id="metal" x1="218" y1="330" x2="1038" y2="943" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#eef8ff"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="0.75" stop-color="#b9c9ef"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="edge" x1="216" y1="943" x2="1038" y2="363" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17f6ff"/>
      <stop offset="0.52" stop-color="#dffcff"/>
      <stop offset="1" stop-color="#a040ff"/>
    </linearGradient>
    <linearGradient id="sheen" x1="370" y1="220" x2="820" y2="920" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.05  0 0 0 0 0.90  0 0 0 0 1.00  0 0 0 0.58 0" result="cyan"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="13" result="blur2"/>
      <feColorMatrix in="blur2" type="matrix" values="0 0 0 0 0.60  0 0 0 0 0.15  0 0 0 0 1.00  0 0 0 0.38 0" result="violet"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="violet"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <path id="wa-shape" d="
      M 999 942 L 628 327 L 255 943 L 365 941 L 628 504 L 891 943 Z
      M 216 363 L 318 363 L 440 570 L 388 658 Z
      M 1038 363 L 937 363 L 815 571 L 866 658 Z"/>
    <clipPath id="waClip"><use href="#wa-shape"/></clipPath>
  </defs>

  <g filter="url(#softGlow)">
    <use href="#wa-shape" fill="url(#metal)"/>
    <use href="#wa-shape" fill="url(#sheen)" opacity="0.58"/>
    <use href="#wa-shape" fill="none" stroke="url(#edge)" stroke-width="7" stroke-linejoin="miter" opacity="0.62"/>
    <use href="#wa-shape" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="miter" opacity="0.55"/>
  </g>
</svg>
