{
  "default_account": "${OPENVIKING_DEFAULT_ACCOUNT}",
  "default_user": "${OPENVIKING_DEFAULT_USER}",
  "default_agent": "${OPENVIKING_DEFAULT_AGENT}",
  "server": {
    "host": "${OPENVIKING_HOST}",
    "port": 1933,
    "workers": 1,
    "auth_mode": "${OPENVIKING_AUTH_MODE}",
    "root_api_key": "${OPENVIKING_ROOT_API_KEY}",
    "telemetry": {
      "prometheus": {
        "enabled": true
      }
    }
  },
  "storage": {
    "workspace": "${OPENVIKING_STORAGE_WORKSPACE}"
  },
  "embedding": {
    "dense": {
      "provider": "openai",
      "model": "${OPENVIKING_EMBEDDING_TEXT_MODEL}",
      "dimension": 2048,
      "api_base": "${OPENVIKING_EMBEDDING_API_BASE}",
      "api_key": "${NVIDIA_API_KEY}",
      "query_param": "${OPENVIKING_EMBEDDING_QUERY_PARAM}",
      "document_param": "${OPENVIKING_EMBEDDING_DOCUMENT_PARAM}"
    },
    "max_retries": 3,
    "text_source": "${OPENVIKING_EMBEDDING_TEXT_SOURCE}"
  },
  "vlm": {
    "model": "${OPENVIKING_VLM_MODEL}",
    "provider": "openai",
    "api_key": "${NVIDIA_API_KEY}",
    "api_base": "${OPENVIKING_VLM_API_BASE}",
    "max_retries": 3,
    "providers": {
      "openai": {
        "api_key": "${NVIDIA_API_KEY}",
        "api_base": "${OPENVIKING_VLM_API_BASE}"
      }
    }
  },
  "rerank": {
    "provider": "litellm",
    "api_key": "${NVIDIA_API_KEY}",
    "api_base": "${OPENVIKING_RERANK_API_BASE}",
    "model": "${OPENVIKING_RERANK_TEXT_MODEL}",
    "threshold": 0.1
  },
  "parsers": {
    "markdown": {
      "max_section_size": 1000,
      "section_size_flexibility": 0.3,
      "max_section_chars": 6000
    },
    "code": {
      "max_section_size": 1000,
      "section_size_flexibility": 0.3,
      "max_section_chars": 6000,
      "code_summary_mode": "ast"
    },
    "pdf": {
      "strategy": "${OPENVIKING_PDF_STRATEGY}",
      "mineru_endpoint": "${OPENVIKING_PARSE_ENDPOINT}",
      "mineru_api_key": "${OPENVIKING_PARSE_API_KEY}"
    }
  },
  "default_search_mode": "thinking",
  "default_search_limit": 8,
  "memory": {
    "version": "v2",
    "agent_scope_mode": "agent"
  }
}
