<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hermes Orchestrator WASM UI</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Hermes Orchestrator</p>
          <h1>WASM Fleet Control Surface</h1>
          <p class="subtitle">
            CLI-backed observability and safe operations for orchestrator + worker nodes.
          </p>
        </div>
        <div class="header-meta">
          <span id="featureBadge" class="badge muted">Loading capabilities...</span>
          <span id="connectionBadge" class="badge">Connecting stream...</span>
        </div>
      </header>

      <main class="grid-layout">
        <section class="panel panel-fleet">
          <div class="panel-head">
            <h2>Fleet Overview</h2>
            <button id="refreshNodesBtn" class="btn ghost">Refresh</button>
          </div>
          <div id="fleetError" class="callout hidden"></div>
          <div id="nodesList" class="nodes-list"></div>
        </section>

        <section class="panel panel-node">
          <div class="panel-head">
            <h2 id="nodeTitle">Node Detail</h2>
            <div class="actions-wrap">
              <button data-action="start" class="btn" id="startActionBtn">Start</button>
              <button data-action="stop" class="btn warning" id="stopActionBtn">Stop</button>
              <button data-action="restart" class="btn danger" id="restartActionBtn">Restart</button>
            </div>
          </div>

          <div id="nodeMeta" class="node-meta empty">Select a node to inspect status and logs.</div>

          <div class="logs-controls">
            <div class="tabs" id="logChannelTabs">
              <button class="tab is-active" data-channel="runtime">Runtime</button>
              <button class="tab" data-channel="management">Management</button>
              <button class="tab" data-channel="attention">Attention</button>
              <button class="tab" data-channel="hermes_errors">Hermes Errors</button>
              <button class="tab" data-channel="hermes_gateway">Hermes Gateway</button>
              <button class="tab" data-channel="hermes_agent">Hermes Agent</button>
            </div>
            <label>
              Tail
              <input id="tailInput" type="number" min="20" max="1500" value="220" />
            </label>
            <button id="reloadLogsBtn" class="btn ghost">Reload Logs</button>
          </div>

          <div class="analysis-strip" id="analysisStrip">
            <p>Analyzer: <strong id="analyzerName">pending</strong></p>
            <p>Events: <strong id="eventCount">0</strong></p>
            <p>Warnings: <strong id="warnCount">0</strong></p>
            <p>Errors: <strong id="errorCount">0</strong></p>
          </div>

          <div id="logOutput" class="log-output"></div>
          <div id="heatmap" class="heatmap"></div>
        </section>
      </main>
    </div>

    <div id="toastRack" class="toast-rack"></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
